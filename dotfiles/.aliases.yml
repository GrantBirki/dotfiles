aliases:
  - name: "ls"
    args: "[path]"
    description: "Directory listing via eza with auto color and directories-first sorting."
  - name: "ll"
    args: "[path]"
    description: "Long all-files listing with custom timestamp format, total size, and octal permissions."
  - name: "la"
    args: "[path]"
    description: "List all files except . and .."
  - name: "l"
    args: "[path]"
    description: "Short listing alias that delegates to ls (which maps to eza)."
  - name: "c"
    args: ""
    description: "Clear the terminal screen."
  - name: "celar"
    args: ""
    description: "Typo-friendly alias for clear."
  - name: "cdc"
    args: ""
    description: "Jump to ~/code."
  - name: "gbr"
    args: ""
    description: "Delete local branches except current, main/master, and origin default branch."
  - name: "gcm"
    args: ""
    description: "Switch to repo default branch (origin/HEAD), with main/master fallback and remote tracking support."
  - name: "lss"
    args: "[path]"
    description: "Detailed eza listing with long ISO timestamps."
  - name: "h"
    args: "[pattern]"
    description: "No args: show full history. With args: case-insensitive history search via rg."
  - name: "dockernuke"
    args: ""
    description: "Remove all containers/images when present, then run docker system prune including volumes."
  - name: "pg"
    args: "[-n|--newest] <pattern>"
    description: "Primary process searcher with highlighted matches and PID/USER/CPU/MEM/ELAPSED/COMMAND columns."
  - name: "ssh"
    args: "[ssh args...]"
    description: "Run ssh with TERM forced to xterm-256color via command ssh."
  - name: "ssh-with-key"
    args: "<private-key-path> [ssh args...]"
    description: "Run one non-Git SSH command with an explicit disk private key and no SSH agent."
  - name: "tailscale"
    args: "[tailscale args...]"
    description: "Directly run the macOS Tailscale binary."
  - name: "ss"
    args: "[--confirm[=2|3]] <VAR_NAME>"
    description: "Alias for set_secret."
  - name: "set_secret"
    args: "[--confirm[=2|3]] <VAR_NAME>"
    description: "Prompt silently for a secret value, optionally confirm it, assign it to the named shell variable, and export it."
  - name: "gp"
    args: "[git pull args...]"
    description: "Shortcut for git pull."
  - name: "npm"
    args: "[npm args...]"
    description: "Run npm through Socket Firewall Free when available."
  - name: "yarn"
    args: "[yarn args...]"
    description: "Run yarn through Socket Firewall Free when available."
  - name: "pnpm"
    args: "[pnpm args...]"
    description: "Run pnpm through Socket Firewall Free when available."
  - name: "pip"
    args: "[pip args...]"
    description: "Run pip through Socket Firewall Free when available."
  - name: "uv"
    args: "[uv args...]"
    description: "Run uv through Socket Firewall Free when available."
  - name: "cargo"
    args: "[cargo args...]"
    description: "Run cargo through Socket Firewall Free when available."
  - name: "sfw_status"
    args: ""
    description: "Show Socket Firewall shim and package-manager resolution status."
  - name: "aliases_help"
    args: "[filter text]"
    description: "Function used by aliases to render command metadata."
  - name: "aliases"
    args: "[filter text]"
    description: "Show this alias reference table from .aliases.yml."
