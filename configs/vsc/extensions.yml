# This file is the authoritative VS Code extension inventory for macOS.
# script/install installs baseline versions, prunes extensions not listed here,
# and configures VS Code selected extension auto-update policy from auto_update.

extensions:
  - id: openai.chatgpt
    version: "26.513.21555"
    auto_update: true
  - id: github.vscode-github-actions
    version: "0.31.5"
    auto_update: false
  - id: golang.go
    version: "0.52.2"
    auto_update: false
  - id: hashicorp.terraform
    version: "2.39.2"
    auto_update: false
  - id: pkief.material-icon-theme
    version: "5.34.0"
    auto_update: false
  - id: redhat.vscode-yaml
    version: "1.23.0"
    auto_update: false
  - id: rust-lang.rust-analyzer
    version: "0.3.2896"
    auto_update: false
